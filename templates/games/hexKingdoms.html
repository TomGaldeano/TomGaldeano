{% include "links.html" %}
<style>
  canvas {
    background-color: slategrey;
    border-radius: 8px;
    display: block;
    max-width: 100%;
    height: auto;
  }
  .game-panel {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
    color: white;
  }
  .game-panel .choices button {
    min-width: 100px;
  }
</style>
{% include "header.html" %}
<div class="row justify-content-center container d-flex mx-auto mb-3">
  <h1>Hex Kingdoms</h1>
</div>
<div class="row justify-content-center container d-flex mx-auto mb-3">
  <div class="game-panel text-center w-100">
    <h2>Choose Your Kingdom</h2>
    <div class="choices d-flex justify-content-center flex-wrap">
      <button class="pickFaction btn btn-primary mx-2 my-1" data-faction="0">Blue</button>
      <button class="pickFaction btn btn-danger mx-2 my-1" data-faction="1">Red</button>
      <button class="pickFaction btn btn-success mx-2 my-1" data-faction="2">Green</button>
      <button class="pickFaction btn btn-warning mx-2 my-1" data-faction="3">Yellow</button>
    </div>
  </div>
</div>
<div class="row justify-content-center container d-flex mx-auto mb-2">
  <div class="game-panel w-100 d-flex flex-column flex-md-row align-items-center justify-content-center gap-3">
    <button id="endTurnBtn" class="d-none d-lg-block game-button">End Turn</button>
    <button id="resetBtn" class="game-button">Reset Game</button>
  </div>
      <div id="statusText" class="text-start text-md-center">Select a kingdom and click a unit.</div>

</div>
<div class="row justify-content-center container d-flex mx-auto">
  <canvas id="hexCanvas" width="1200" height="600"></canvas>
</div>
<script src="../../static/js/hexKingdoms.js"></script>
