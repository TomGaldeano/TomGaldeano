{% include "links.html" %}
<style>
  h1 {
    margin-bottom: 20px;
  }

  canvas {
    background-color: #27ae60;
    border-radius: 8px;
    display: block;
  }


  button:active {
    transform: scale(0.95);
  }

  #new-btn{
    color: black;
    font-weight: bold;
  }

  #hit-btn {
    background-color: #f1c40f;
    color: black;
    font-weight: bold;
  }

  #stand-btn {
    background-color: #e74c3c;
    color: black;
    font-weight: bold;
  }

  #deal-btn {
    background-color: #3498db;
    color: black;
    font-weight: bold;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
</style>
{% include "header.html" %}
<div class="row justify-content-center container d-flex mx-auto">
  <h1>Blackjack</h1>
</div>
<div class="row justify-content-center container d-flex mx-auto">
<h4 class="d-none d-lg-block">Player: <span id="player">0</span> House: <span id="house">0</span></h4>
</div>
<div class="row justify-content-center container d-flex mx-auto">
  <canvas id="blackjackCanvas" width="1200" height="600" class="d-none d-lg-block"></canvas>
  <p class="plain-p text-center d-block d-lg-none no-game">
  Por desgracia este juego
  no esta disponible en pantallas pequeñas
</p>
</div>
<div class="row justify-content-center container d-lg-flex mx-auto d-none">
  <button id="new-btn" class="game-button mx-2 my-1">New Game</button>
  <button id="hit-btn" disabled class="game-button mx-2 my-1">Hit</button>
  <button id="stand-btn" disabled class="game-button mx-2 my-1">Stand</button>
  <button id="deal-btn" disabled class="game-button mx-2 my-1">Deal</button>
</div>

<script src="{{ url_for('static', filename='js/Blackjack.js') }}">


</script>
