{% include "links.html" %}
<style>
  h1 {
    margin-bottom: 20px;
  }

  canvas {
    background-color: #27ae60;
    border-radius: 8px;
    display: block;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin: 10px 20px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    transition: transform 0.1s, opacity 0.2s;
  }

  button:active {
    transform: scale(0.95);
  }

  #hit-btn {
    background-color: #f1c40f;
    color: #2c3e50;
  }

  #stand-btn {
    background-color: #e74c3c;
    color: white;
  }

  #deal-btn {
    background-color: #3498db;
    color: white;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
</style>
{% include "header.html" %}
<div class="row justify-content-center container d-flex mx-auto">
  <h1>Blackjack</h1>
</div>
<div class="row justify-content-center container d-flex mx-auto">
<h4>Player: <span id="player">0</span> House: <span id="house">0</span></h4>
</div>
<div class="row justify-content-center container d-flex mx-auto">
  <canvas id="blackjackCanvas" width="1200" height="600"></canvas>
</div>
<div class="row justify-content-center container d-flex mx-auto">
  <button id="new-btn">New Game</button>
  <button id="hit-btn" disabled>Hit</button>
  <button id="stand-btn" disabled>Stand</button>
  <button id="deal-btn" disabled>Deal</button>
</div>

<script src="{{ url_for('static', filename='js/Blackjack.js') }}">


</script>
