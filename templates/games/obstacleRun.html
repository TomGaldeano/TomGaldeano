{% include "links.html" %}
<style>
    canvas {
      background-color: slategrey;
      border-radius: 8px;
      display: block;
      margin: 20px auto;
    }
    #gameContainer {
      text-align: center;
    }
    #score {
      font-size: 24px;
      color: white;
      margin: 10px;
    }
    .difficulty-buttons {
      margin: 20px;
    }
    .difficulty-buttons button {
      margin: 0 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: var(--grey);
      color: black;
    }
    .difficulty-buttons button:hover {
      background-color: var(--green);
      color: var(--white);
    }
</style>
{% include "header.html" %}
<div class="row justify-content-center container d-flex mx-auto">
  <h1>Obstacle Run</h1>
</div>
<div class="row justify-content-center container d-flex mx-auto">
  <div id="gameContainer">
    <div id="score">Score: 0</div>
    <canvas id="runCanvas" width="1200" height="600"></canvas>
  </div>
</div>
<div class="row justify-content-center container d-flex mx-auto difficulty-buttons" id="difficultyButtons">
  <button onclick="setDifficulty('easy')">Easy</button>
  <button onclick="setDifficulty('medium')">Medium</button>
  <button onclick="setDifficulty('hard')">Hard</button>
  <button onclick="setDifficulty('hell')">Hell</button>
</div>

<script src="{{ url_for('static', filename='js/obstacleRun.js') }}"></script>
{% include "footer.html" %}
