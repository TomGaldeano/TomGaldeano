<style>
    canvas {
      background-color: slategrey;
      border-radius: 8px;
      display: block;
      margin: 20px auto;
    }
    #gameContainer {
      text-align: center;
    }
    #score {
      font-size: 24px;
      color: white;
      margin: 10px;
    }
    .difficulty-buttons {
      margin: 20px;
    }
    .difficulty-buttons button {
      margin: 0 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
</style>
{% include "header.html" %}
<div class="row justify-content-center container d-flex mx-auto">
  <h1>Obstacle Run</h1>
</div>
<div class="row justify-content-center container d-flex mx-auto">
  <div id="gameContainer">
    <div id="score">Score: 0</div>
    <canvas id="runCanvas" width="1200" height="600"></canvas>
  </div>
</div>
<div class="row justify-content-center container d-flex mx-auto difficulty-buttons" id="difficultyButtons">
  <button onclick="setDifficulty('easy')">Easy</button>
  <button onclick="setDifficulty('medium')">Medium</button>
  <button onclick="setDifficulty('hard')">Hard</button>
</div>
<script>
const CANVAS_WIDTH = 1200;
const CANVAS_HEIGHT = 600;
const SAFE_TOP = 30;
const SAFE_BOTTOM = 570;
const canvas = document.querySelector('#runCanvas');
const ctx = canvas.getContext('2d');

// Difficulty settings
let difficultySettings = {
  easy: { obstacleSpeed: 8, spawnRate: 80 },
  medium: { obstacleSpeed: 12, spawnRate: 60 },
  hard: { obstacleSpeed: 16, spawnRate: 40 }
};
let currentDifficulty = null;

class Runner {
  constructor() {
    this.height = 30;
    this.width = 20;
    this.x = 60;
    this.y = CANVAS_HEIGHT / 2;
    this.speed = 8;
    this.moving = false;
  }

  draw() {
    ctx.fillStyle = '#00FF00';
    ctx.fillRect(this.x, this.y, this.width, this.height);
    // Draw eyes
    ctx.fillStyle = '#000000';
    ctx.fillRect(this.x + 3, this.y + 8, 4, 4);
    ctx.fillRect(this.x + 13, this.y + 8, 4, 4);
  }

  moveUp() {
    if (this.y > SAFE_TOP) {
      this.y -= this.speed;
    }
  }

  moveDown() {
    if (this.y + this.height < SAFE_BOTTOM) {
      this.y += this.speed;
    }
  }

  collidesWith(obstacle) {
    return (
      this.x < obstacle.x + obstacle.width &&
      this.x + this.width > obstacle.x &&
      this.y < obstacle.y + obstacle.height &&
      this.y + this.height > obstacle.y
    );
  }
}

class Obstacle {
  constructor(speed) {
    this.width = 30;
    this.height = 50;
    this.x = CANVAS_WIDTH;
    this.y = Math.random() * (SAFE_BOTTOM - SAFE_TOP - this.height) + SAFE_TOP;
    this.speed = speed;
    this.color = '#FF6B00';
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.width, this.height);
    ctx.strokeStyle = '#FFB700';
    ctx.lineWidth = 2;
    ctx.strokeRect(this.x, this.y, this.width, this.height);
  }

  update() {
    this.x -= this.speed;
  }

  isOffScreen() {
    return this.x + this.width < 0;
  }
}

class Game {
  constructor() {
    this.iter = 0;
    this.runner = new Runner();
    this.obstacles = [];
    this.score = 0;
    this.gameOver = false;
    this.obstacleSpawnCounter = 0;
    this.keysPressed = {};
    
    // Keyboard event listeners
    window.addEventListener('keydown', (e) => {
      this.keysPressed[e.key] = true;
      if (e.key === ' ') e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
      this.keysPressed[e.key] = false;
    });
  }

  handleInput() {
    if (this.keysPressed['ArrowUp'] || this.keysPressed['w'] || this.keysPressed['W']) {
      this.runner.moveUp();
    }
    if (this.keysPressed['ArrowDown'] || this.keysPressed['s'] || this.keysPressed['S']) {
      this.runner.moveDown();
    }
    if (this.gameOver && (this.keysPressed['r'] || this.keysPressed['R'])) {
      this.restart();
    }
  }

  spawnObstacle() {
    if (!currentDifficulty) return;
    this.obstacleSpawnCounter++;
    if (this.obstacleSpawnCounter > difficultySettings[currentDifficulty].spawnRate) {
      this.obstacles.push(new Obstacle(difficultySettings[currentDifficulty].obstacleSpeed));
      this.obstacleSpawnCounter = 0;
    }
  }

  checkCollisions() {
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      if (this.runner.collidesWith(this.obstacles[i])) {
        this.gameOver = true;
      }
    }
  }

  updateScore() {
    document.getElementById('score').textContent = `Score: ${this.score}`;
  }

  draw_landscape() {
    if (!currentDifficulty) return;

    ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

    // Draw safe zone background
    ctx.fillStyle = '#2a4a2a';
    ctx.fillRect(0, SAFE_TOP, CANVAS_WIDTH, SAFE_BOTTOM - SAFE_TOP);

    // Draw red danger zone at top
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(0, 0, CANVAS_WIDTH, SAFE_TOP);
    ctx.fillStyle = '#AA0000';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('DANGER', 10, 20);

    // Draw white danger zone at bottom
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(0, SAFE_BOTTOM, CANVAS_WIDTH, CANVAS_HEIGHT - SAFE_BOTTOM);
    ctx.fillStyle = '#333333';
    ctx.fillText('DANGER', 10, CANVAS_HEIGHT - 10);

    // Draw animated ground stripes
    this.iter++;
    if (this.iter > 40) {
      this.iter = 0;
    }
    for (let i = 0; i < 35; i++) {
      ctx.fillStyle = 'white';
      ctx.fillRect(20 - this.iter + i * 40, CANVAS_HEIGHT - 20, 20, 10);
      ctx.fillStyle = 'red';
      ctx.fillRect(0 - this.iter + i * 40, CANVAS_HEIGHT - 20, 20, 10);
    }

    // Handle input
    this.handleInput();

    // Update and draw obstacles
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      this.obstacles[i].update();
      this.obstacles[i].draw();

      if (this.obstacles[i].isOffScreen()) {
        this.obstacles.splice(i, 1);
        this.score += 10;
        this.updateScore();
      }
    }

    // Spawn new obstacles
    this.spawnObstacle();

    // Draw runner
    this.runner.draw();

    // Check collisions
    this.checkCollisions();

    // Draw game over screen
    if (this.gameOver) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2);
      ctx.fillStyle = '#FFFF00';
      ctx.font = '24px Arial';
      ctx.fillText(`Final Score: ${this.score}`, CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 50);
      ctx.fillText('Press R to Restart', CANVAS_WIDTH / 2, CANVAS_HEIGHT / 2 + 90);
    }
  }

  restart() {
    this.runner = new Runner();
    this.obstacles = [];
    this.score = 0;
    this.gameOver = false;
    this.obstacleSpawnCounter = 0;
    this.updateScore();
  }
}

const game = new Game();

function setDifficulty(difficulty) {
  currentDifficulty = difficulty;
  document.getElementById('difficultyButtons').style.display = 'none';
  game.restart();
}

// Game loop
setInterval(() => {
  game.draw_landscape();
}, 40);
</script>
